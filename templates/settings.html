<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paramètres — JobHunt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #07070d; --bg-alt: #0c0c16; --card: #12121e;
    --card-hover: #181828; --border: #1e1e32; --border-light: #2a2a44;
    --text: #e8e8f0; --text-dim: #8888a8; --text-muted: #55557a;
    --accent: #7c6cf0; --accent-dim: #5a4bc0; --accent-glow: rgba(124,108,240,0.12);
    --green: #00d68f; --orange: #ff9f43; --red: #ff6b6b; --blue: #54a0ff;
    --radius: 12px; --radius-lg: 16px;
  }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(124,108,240,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,108,240,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .bg-glow {
    position: fixed; top: -40vh; left: -20vw;
    width: 80vw; height: 80vh;
    background: radial-gradient(ellipse, rgba(124,108,240,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
    animation: glow-drift 12s ease-in-out infinite alternate;
  }
  @keyframes glow-drift {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(10vw,5vh) scale(1.2); }
  }

  .app { position:relative; z-index:1; min-height:100vh; }

  .header {
    position: sticky; top:0; z-index:100;
    padding: 0 32px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(7,7,13,0.85);
    backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: 1px solid var(--border);
  }
  .header-logo {
    font-size: 16px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), #a89bff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .header-logo span { font-weight: 400; -webkit-text-fill-color: var(--text-dim); }
  .header-nav { display: flex; gap: 4px; align-items: center; }
  .header-nav a {
    padding: 6px 14px; border-radius: 8px; text-decoration: none;
    font-size: 13px; font-weight: 500; color: var(--text-dim);
    transition: all 0.2s;
  }
  .header-nav a:hover { color: var(--text); background: var(--card); }
  .header-nav a.active { color: var(--accent); background: var(--accent-glow); }

  .header-right { display: flex; align-items: center; gap: 14px; }

  /* ── User Menu ── */
  .user-menu {
    position: relative;
  }
  .user-trigger {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 8px 4px 4px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit; font-size: 13px; color: var(--text);
  }
  .user-trigger:hover { border-color: var(--accent); background: var(--card-hover); }
  .user-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
    overflow: hidden; flex-shrink: 0;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .user-name { font-weight: 500; font-size: 12px; }
  .user-chevron {
    font-size: 10px; color: var(--text-muted);
    transition: transform 0.2s;
  }
  .user-chevron.open { transform: rotate(180deg); }
  .user-dropdown {
    position: absolute; top: calc(100% + 6px); right: 0;
    min-width: 200px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px;
    display: none;
    z-index: 200;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .user-dropdown.open { display: block; }
  .user-dropdown .dd-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .user-dropdown .dd-header .name { font-weight: 600; font-size: 13px; }
  .user-dropdown .dd-header .email { font-size: 11px; color: var(--text-muted); }
  .user-dropdown a {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 8px;
    text-decoration: none; color: var(--text-dim);
    font-size: 13px; font-weight: 500;
    transition: all 0.15s;
  }
  .user-dropdown a:hover { background: var(--card-hover); color: var(--text); }
  .user-dropdown .dd-divider {
    height: 1px; background: var(--border);
    margin: 4px 12px;
  }
  .user-dropdown .dd-danger { color: var(--red); }
  .user-dropdown .dd-danger:hover { background: rgba(255,107,107,0.1); color: var(--red); }

  /* ── Settings Layout ── */
  .main { max-width: 720px; margin: 0 auto; padding: 32px; }
  .page-title {
    font-size: 22px; font-weight: 800; margin-bottom: 4px;
    letter-spacing: -0.5px;
  }
  .page-sub {
    font-size: 13px; color: var(--text-dim); margin-bottom: 28px;
  }

  .settings-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
    margin-bottom: 16px;
  }
  .settings-card h2 {
    font-size: 14px; font-weight: 700; margin-bottom: 20px;
    letter-spacing: -0.3px;
  }

  /* ── Avatar Upload ── */
  .avatar-section {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 24px;
  }
  .avatar-preview {
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--accent-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700; color: #fff;
    overflow: hidden; flex-shrink: 0;
    border: 2px solid var(--border);
    position: relative;
  }
  .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-preview .initial { position: absolute; }
  .avatar-upload {
    display: flex; flex-direction: column; gap: 6px;
  }
  .avatar-upload label {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px;
    background: var(--accent); color: #fff;
    font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    border: none; font-family: inherit;
  }
  .avatar-upload label:hover { background: var(--accent-dim); }
  .avatar-upload input[type="file"] { display: none; }
  .avatar-hint { font-size: 11px; color: var(--text-muted); }

  /* ── Form ── */
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-muted); margin-bottom: 6px;
  }
  .form-group input,
  .form-group textarea {
    width: 100%; padding: 10px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-size: 14px; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { min-height: 80px; resize: vertical; }
  .form-group input:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-save {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 24px; border-radius: 8px;
    background: var(--accent); color: #fff;
    font-size: 13px; font-weight: 600;
    border: none; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .btn-save:hover { background: var(--accent-dim); transform: scale(1.02); }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

  .success-toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 8px;
    background: rgba(0,214,143,0.15); border: 1px solid rgba(0,214,143,0.3);
    color: var(--green); font-size: 13px; font-weight: 600;
    display: none; z-index: 999;
    backdrop-filter: blur(10px);
  }
  .success-toast.show { display: block; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

  .error-msg { color: var(--red); font-size: 12px; margin-top: 4px; display: none; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="app">

<header class="header">
  <div style="display:flex;align-items:center;gap:24px;">
    <a href="/" class="header-logo" style="text-decoration:none;">JobHunt <span>· Paramètres</span></a>
    <nav class="header-nav">
      <a href="/">Dashboard</a>
      <a href="/cv">CV</a>
      <a href="/marche-qa">Marché</a>
      <a href="/about">À propos</a>
    </nav>
  </div>
  <div class="header-right">
    <div class="user-menu" id="user-menu">
      <button class="user-trigger" id="user-trigger" onclick="toggleDropdown()">
        <div class="user-avatar" id="nav-avatar">—</div>
        <span class="user-name" id="nav-name">—</span>
        <span class="user-chevron" id="nav-chevron">▼</span>
      </button>
      <div class="user-dropdown" id="user-dropdown">
        <div class="dd-header">
          <div class="name" id="dd-name">—</div>
          <div class="email" id="dd-email">—</div>
        </div>
        <a href="/settings">⚙️ Paramètres</a>
        <div class="dd-divider"></div>
        <a href="#" class="dd-danger" onclick="logout();return false;">🚪 Déconnexion</a>
      </div>
    </div>
  </div>
</header>

<main class="main">
  <h1 class="page-title">Paramètres du compte</h1>
  <p class="page-sub">Gère ton profil, ta photo et tes préférences.</p>

  <div class="settings-card">
    <h2>Photo de profil</h2>
    <div class="avatar-section">
      <div class="avatar-preview" id="avatar-preview">
        <span class="initial" id="avatar-initial">?</span>
        <img id="avatar-img" style="display:none;">
      </div>
      <div class="avatar-upload">
        <label for="avatar-input">📷 Choisir une photo</label>
        <input type="file" id="avatar-input" accept="image/jpeg,image/png,image/webp">
        <div class="avatar-hint">JPG, PNG ou WebP. 1 Mo max.</div>
      </div>
    </div>
  </div>

  <div class="settings-card">
    <h2>Informations générales</h2>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="input-email" disabled>
    </div>
    <div class="form-group">
      <label>Nom complet</label>
      <input type="text" id="input-name" placeholder="Ton nom">
    </div>
    <div class="form-group">
      <label>Titre / Poste</label>
      <input type="text" id="input-headline" placeholder="Ex: Consultant QA Senior">
    </div>
    <div class="form-group">
      <label>Localisation</label>
      <input type="text" id="input-location" placeholder="Ex: Paris & Remote">
    </div>
    <div class="form-group">
      <label>Téléphone</label>
      <input type="text" id="input-phone" placeholder="Ex: 07 XX XX XX XX">
    </div>
    <div class="form-group">
      <label>Bio</label>
      <textarea id="input-bio" placeholder="Quelques mots sur toi..."></textarea>
    </div>
    <button class="btn-save" id="btn-save" onclick="saveProfile()">💾 Enregistrer</button>
    <div class="error-msg" id="save-error"></div>
  </div>
</main>

<div class="success-toast" id="toast">✅ Modifications enregistrées</div>

<script>
let currentProfile = {};
let avatarChanged = false;

// ── Auth check + load profile ──
function init() {
  fetch('/api/auth/me')
    .then(r => r.json())
    .then(d => {
      if (!d.authenticated) { window.location.href = '/login'; return; }
      renderUserMenu(d);
      currentProfile = d;
      document.getElementById('input-email').value = d.email || '';
      if (d.full_name) document.getElementById('input-name').value = d.full_name;
      if (d.headline) document.getElementById('input-headline').value = d.headline;
    });

  // Load full profile
  fetch('/api/profile')
    .then(r => r.json())
    .then(d => {
      if (d.error) return;
      currentProfile = d;
      if (d.full_name) document.getElementById('input-name').value = d.full_name;
      if (d.headline) document.getElementById('input-headline').value = d.headline;
      if (d.location) document.getElementById('input-location').value = d.location;
      if (d.phone) document.getElementById('input-phone').value = d.phone;
      if (d.bio) document.getElementById('input-bio').value = d.bio;
      if (d.avatar_url) updateAvatarUI(d.avatar_url, d.full_name || d.email);
    });

  // Avatar upload handler
  document.getElementById('avatar-input').onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    if (file.size > 1 * 1024 * 1024) { alert('Image trop grande — 1 Mo max'); return; }
    var reader = new FileReader();
    reader.onload = function(ev) {
      var b64 = ev.target.result.split(',')[1];
      updateAvatarUI(ev.target.result, currentProfile.full_name || currentProfile.email);
      // Upload to server
      fetch('/api/profile/avatar', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({avatar: b64})
      }).then(r => r.json()).then(d => {
        if (d.ok) { showToast('✅ Photo mise à jour'); avatarChanged = true; }
      });
    };
    reader.readAsDataURL(file);
  };
}

function renderUserMenu(d) {
  var displayName = d.full_name || '';
  var initial = displayName ? displayName.charAt(0).toUpperCase() : (d.email || '—').charAt(0).toUpperCase();
  document.getElementById('nav-name').textContent = displayName || initial;
  document.getElementById('dd-name').textContent = displayName || initial;
  var avatarEl = document.getElementById('nav-avatar');
  if (d.avatar_url) {
    avatarEl.innerHTML = '<img src="' + d.avatar_url + '" alt="">';
  } else {
    avatarEl.textContent = initial;
  }
}

function updateAvatarUI(url, name) {
  var initial = name ? name.charAt(0).toUpperCase() : '?';
  var preview = document.getElementById('avatar-preview');
  var img = document.getElementById('avatar-img');
  var initSpan = document.getElementById('avatar-initial');
  if (url && url.startsWith('data:')) {
    img.src = url;
    img.style.display = 'block';
    initSpan.style.display = 'none';
  } else {
    initSpan.textContent = initial;
    initSpan.style.display = 'block';
    img.style.display = 'none';
  }
  // Also update nav avatar
  var navAvatar = document.getElementById('nav-avatar');
  if (url && url.startsWith('data:')) {
    navAvatar.innerHTML = '<img src="' + url + '" alt="">';
  }
}

function toggleDropdown() {
  document.getElementById('user-dropdown').classList.toggle('open');
  document.getElementById('nav-chevron').classList.toggle('open');
}

document.addEventListener('click', function(e) {
  var menu = document.getElementById('user-menu');
  if (!menu.contains(e.target)) {
    document.getElementById('user-dropdown').classList.remove('open');
    document.getElementById('nav-chevron').classList.remove('open');
  }
});

function saveProfile() {
  var data = {
    full_name: document.getElementById('input-name').value.trim(),
    headline: document.getElementById('input-headline').value.trim(),
    location: document.getElementById('input-location').value.trim(),
    phone: document.getElementById('input-phone').value.trim(),
    bio: document.getElementById('input-bio').value.trim(),
  };
  var btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = '⏳ Enregistrement...';
  document.getElementById('save-error').style.display = 'none';

  fetch('/api/profile', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  })
    .then(r => r.json())
    .then(d => {
      if (d.error) {
        document.getElementById('save-error').textContent = d.error;
        document.getElementById('save-error').style.display = 'block';
        return;
      }
      renderUserMenu(d);
      showToast('✅ Modifications enregistrées');
    })
    .finally(function() { btn.disabled = false; btn.textContent = '💾 Enregistrer'; });
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function logout() {
  fetch('/api/auth/logout', {method:'POST'}).then(function() { window.location.href = '/'; });
}

init();
</script>
</body>
</html>
