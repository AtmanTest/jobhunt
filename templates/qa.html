<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Test Démo — JobHunt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #07070d; --bg-alt: #0c0c16; --card: #12121e;
    --card-hover: #181828; --border: #1e1e32; --border-light: #2a2a44;
    --text: #e8e8f0; --text-dim: #8888a8; --text-muted: #55557a;
    --accent: #7c6cf0; --accent-dim: #5a4bc0;
    --accent-glow: rgba(124,108,240,0.12); --accent-glow-strong: rgba(124,108,240,0.2);
    --green: #00d68f; --green-dim: rgba(0,214,143,0.12);
    --orange: #ff9f43; --red: #ff6b6b; --gold: #ffd93d; --blue: #54a0ff;
    --glass: rgba(18,18,30,0.8); --radius: 12px; --radius-lg: 16px;
  }
  body { font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
  ::-webkit-scrollbar { width:4px; height:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .bg-grid { position:fixed; inset:0; z-index:0; background-image:linear-gradient(rgba(124,108,240,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(124,108,240,0.03) 1px, transparent 1px); background-size:60px 60px; pointer-events:none; }
  .bg-glow { position:fixed; top:-40vh; left:-20vw; width:80vw; height:80vh; background:radial-gradient(ellipse, rgba(124,108,240,0.06) 0%, transparent 70%); pointer-events:none; z-index:0; animation:glow-drift 12s ease-in-out infinite alternate; }
  .bg-glow-2 { position:fixed; bottom:-30vh; right:-10vw; width:60vw; height:60vh; background:radial-gradient(ellipse, rgba(0,214,143,0.04) 0%, transparent 70%); pointer-events:none; z-index:0; animation:glow-drift-2 15s ease-in-out infinite alternate; }
  @keyframes glow-drift { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(10vw,5vh) scale(1.2)} }
  @keyframes glow-drift-2 { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(-8vw,-5vh) scale(1.15)} }

  .app { position:relative; z-index:1; min-height:100vh; }

  /* ── Header (identical to Dashboard) ── */
  .header { position:sticky; top:0; z-index:100; height:52px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; background:var(--glass); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }
  .header-logo { font-size:14px; font-weight:700; letter-spacing:-.3px; background:linear-gradient(135deg,var(--accent),var(--blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .header-logo span { font-weight:400; -webkit-text-fill-color:var(--text-dim); }
  .header-nav { display:flex; gap:4px; align-items:center; }
  .header-nav a { font-size:12px; font-weight:500; color:var(--text-muted); text-decoration:none; padding:6px 12px; border-radius:8px; transition:all .15s; }
  .header-nav a:hover { color:var(--text); background:var(--card); }
  .header-nav a.active { color:var(--accent); background:var(--accent-glow); }
  .header-right { display:flex; align-items:center; gap:14px; }
  .live-dot { font-size:11px; color:var(--text-muted); display:flex; align-items:center; gap:6px; }
  .live-dot::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse-dot 2s infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Page Title ── */
  .page-title { padding:24px 24px 0; display:flex; align-items:center; justify-content:space-between; }
  .page-title h1 { font-size:22px; font-weight:700; letter-spacing:-.4px; display:flex; align-items:center; gap:10px; }
  .page-title h1 span { font-size:10px; font-weight:500; color:var(--text-muted); background:var(--card); padding:3px 12px; border-radius:20px; border:1px solid var(--border); }

  /* ── Content ── */
  .main { max-width:1100px; margin:0 auto; padding:16px 24px 40px; }

  /* Plans pills */
  .plans-row { display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; }
  .plan-pill { padding:8px 18px; border-radius:20px; border:1px solid var(--border); background:var(--card); font-size:12px; font-weight:600; cursor:pointer; color:var(--text-dim); font-family:inherit; transition:all .15s; display:flex; align-items:center; gap:5px; }
  .plan-pill:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-glow); }
  .plan-pill .cnt { font-size:10px; color:var(--text-muted); font-weight:500; }
  .plan-pill .icn { font-size:14px; }

  /* Suite grid */
  .suite-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:12px; margin-bottom:24px; }
  .suite-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:all .15s; }
  .suite-card:hover { border-color:var(--border-light); }
  .sc-head { padding:16px 18px 12px; display:flex; align-items:flex-start; justify-content:space-between; }
  .sc-head-l { display:flex; align-items:center; gap:10px; }
  .sc-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
  .sc-icon.pw { background:var(--green-dim); } .sc-icon.bdd { background:var(--accent-glow); } .sc-icon.api { background:rgba(84,160,255,0.12); }
  .sc-name { font-size:14px; font-weight:600; }
  .sc-count { font-size:11px; color:var(--text-muted); font-weight:400; margin-left:6px; }
  .sc-desc { font-size:11px; color:var(--text-dim); margin:2px 0 0; }
  .sc-run { padding:5px 14px; border-radius:8px; border:none; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; flex-shrink:0; }
  .sc-run.pw { background:var(--green-dim); color:var(--green); } .sc-run.pw:hover { background:rgba(0,214,143,0.2); }
  .sc-run.bdd { background:var(--accent-glow); color:var(--accent); } .sc-run.bdd:hover { background:var(--accent-glow-strong); }
  .sc-run.api { background:rgba(84,160,255,0.12); color:var(--blue); } .sc-run.api:hover { background:rgba(84,160,255,0.2); }

  .sc-body { padding:0 18px 2px; }
  .stest { display:flex; align-items:center; gap:8px; padding:7px 0; border-top:1px solid rgba(255,255,255,0.04); font-size:12px; }
  .stest:first-child { border-top:none; }
  .stest-id { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); width:48px; flex-shrink:0; }
  .stest-name { flex:1; color:var(--text-dim); }
  .stest-dur { font-size:10px; color:var(--text-muted); width:40px; text-align:right; }
  .stest-res { font-size:13px; width:18px; text-align:center; }

  /* Section blocks */
  .section { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:16px; }
  .section-head { padding:14px 18px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.05); }
  .section-head h2 { font-size:13px; font-weight:700; letter-spacing:.2px; display:flex; align-items:center; gap:6px; }
  .section-head .sh-right { display:flex; align-items:center; gap:10px; }
  .section-body { padding:4px 18px 8px; }

  /* Run entry */
  .r-entry { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.04); cursor:pointer; transition:background .1s; margin:0 -18px; padding:10px 18px; }
  .r-entry:hover { background:var(--card-hover); }
  .r-entry:last-child { border-bottom:none; }
  .re-icon { font-size:18px; width:28px; text-align:center; }
  .re-info { flex:1; min-width:0; }
  .re-title { font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; }
  .re-meta { font-size:11px; color:var(--text-muted); margin-top:2px; }
  .re-meta a { color:var(--accent); text-decoration:none; }
  .re-meta a:hover { text-decoration:underline; }
  .re-bar { display:flex; gap:2px; height:8px; border-radius:4px; overflow:hidden; width:90px; background:rgba(255,255,255,0.06); flex-shrink:0; }
  .re-bar .pass { background:var(--green); transition:flex .3s; }
  .re-bar .fail { background:var(--red); transition:flex .3s; }
  .re-stats { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); width:70px; text-align:right; flex-shrink:0; }
  .re-arrow { font-size:10px; color:var(--text-muted); flex-shrink:0; transition:transform .2s; }

  /* Detail */
  .r-detail { display:none; margin:0 -18px; padding:2px 18px 8px 54px; background:rgba(255,255,255,0.02); }
  .r-detail.open { display:block; }
  .rd-item { display:flex; align-items:center; gap:8px; padding:5px 0; font-size:12px; border-bottom:1px solid rgba(255,255,255,0.03); }
  .rd-item:last-child { border-bottom:none; }
  .rd-id { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); width:48px; }
  .rd-name { flex:1; }
  .rd-suite { font-size:10px; color:var(--text-muted); background:var(--bg-alt); padding:1px 8px; border-radius:10px; }
  .rd-dur { font-size:10px; color:var(--text-muted); width:40px; text-align:right; }
  .rd-err { font-size:11px; color:var(--red); margin:4px 0 0 56px; padding:4px 10px; background:rgba(255,107,107,0.1); border-radius:8px; font-family:'JetBrains Mono',monospace; }

  /* GitHub button */
  .gh-btn { padding:7px 18px; border-radius:8px; border:1px solid var(--border); background:var(--bg-alt); color:var(--text-dim); font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:6px; transition:all .15s; }
  .gh-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-glow); }
  .gh-btn:disabled { opacity:.4; cursor:not-allowed; }

  .badge { font-size:10px; padding:2px 10px; border-radius:20px; font-weight:600; }
  .badge.success { background:var(--green-dim); color:var(--green); }
  .badge.fail { background:rgba(255,107,107,0.12); color:var(--red); }
  .badge.progress { background:rgba(255,159,67,0.12); color:var(--orange); }
  .badge.pending { background:rgba(84,160,255,0.12); color:var(--blue); }

  .empty-state { text-align:center; padding:24px; color:var(--text-muted); font-size:12px; }
  .toast { position:fixed; bottom:24px; right:24px; padding:10px 20px; border-radius:10px; font-size:12px; font-weight:600; opacity:0; transform:translateY(24px); transition:all .3s cubic-bezier(.4,0,.2,1); z-index:2000; box-shadow:0 4px 24px rgba(0,0,0,.4); }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.ok { background:var(--green-dim); color:var(--green); border:1px solid rgba(0,214,143,0.3); }
  .toast.err { background:rgba(255,107,107,0.15); color:var(--red); border:1px solid rgba(255,107,107,0.3); }

  @media(max-width:640px) {
    .suite-grid { grid-template-columns:1fr; }
    .main { padding:12px; }
    .header { padding:0 12px; }
    .page-title { padding:16px 12px 0; flex-direction:column; align-items:flex-start; gap:8px; }
    .header-nav { gap:0; }
    .header-nav a { padding:4px 8px; font-size:11px; }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="bg-glow-2"></div>

<div class="app">

  <!-- ─── HEADER (identical to Dashboard) ─── -->
  <div class="header">
    <div class="header-logo">JobHunt <span>· QA Market</span></div>
    <div class="header-nav">
      <a href="{{ url_for('index') }}">Dashboard</a>
      <a href="{{ url_for('cv_page') }}">CV</a>
      <a href="{{ url_for('qa_dashboard') }}" class="active">QA</a>
      <a href="{{ url_for('marche_qa') }}">Marché</a>
      <a href="{{ url_for('stats_page') }}">Stats</a>
      <a href="{{ url_for('about') }}">À propos</a>
    </div>
    <div class="header-right">
      <span class="live-dot"><span class="time">démo</span></span>
    </div>
  </div>

  <!-- ─── PAGE TITLE ─── -->
  <div class="page-title">
    <h1>🧪 QA Test Démo <span>16 tests · Playwright + API</span></h1>
  </div>

  <div class="main">

    <!-- Plans -->
    <div class="plans-row" id="plans-bar">
      <button class="plan-pill active" onclick="showPlan('all')"><span class="icn">📋</span> Tous</button>
    </div>

    <!-- Suite grid -->
    <div id="suites-container"><div class="empty-state">Chargement…</div></div>

    <!-- GitHub CI -->
    <div class="section">
      <div class="section-head">
        <h2>🐙 CI GitHub</h2>
        <div class="sh-right">
          <span style="font-size:11px;color:var(--text-muted)">Playwright sur GitHub Actions</span>
          <button class="gh-btn" id="gh-trigger-btn" onclick="triggerGitHubRun()">▶ Lancer</button>
        </div>
      </div>
      <div class="section-body" id="gh-runs-list">
        <div class="empty-state">Aucun run GitHub</div>
      </div>
    </div>

    <!-- Local -->
    <div class="section">
      <div class="section-head">
        <h2>📊 Local</h2>
        <span style="font-size:11px;color:var(--text-muted)">Exécution sur ta machine</span>
      </div>
      <div class="section-body" id="runs-history">
        <div class="empty-state">Chargement…</div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let suitesData = {}, plansData = {}, ghPollTimer = null;

function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (err ? 'err' : 'ok');
  setTimeout(() => t.classList.remove('show'), 3000);
}

fetch('/qa/api/suites')
  .then(r => r.json())
  .then(data => {
    suitesData = data.suites || {}; plansData = data.plans || {};
    const bar = document.getElementById('plans-bar');
    Object.entries(plansData).forEach(([id, p]) => {
      const btn = document.createElement('button');
      btn.className = 'plan-pill';
      btn.innerHTML = `<span class="icn">${p.icon||'📋'}</span> ${p.name} <span class="cnt">${p.suites.length}s</span>`;
      btn.onclick = () => runPlan(id);
      bar.appendChild(btn);
    });
    renderSuites(); loadRuns(); loadGitHubRuns();
  })
  .catch(() => document.getElementById('suites-container').innerHTML = '<div class="empty-state">❌ Erreur</div>');

function renderSuites() {
  const c = document.getElementById('suites-container');
  let html = '<div class="suite-grid">';
  Object.entries(suitesData).forEach(([id, s]) => {
    const ic = id==='playwright'?'pw':(id==='bdd'?'bdd':'api');
    html += '<div class="suite-card"><div class="sc-head"><div class="sc-head-l">';
    html += `<div class="sc-icon ${ic}">${s.icon||'📦'}</div><div>`;
    html += `<div class="sc-name">${s.name} <span class="sc-count">${s.test_count} tests</span></div>`;
    html += `<div class="sc-desc">${s.description}</div></div></div>`;
    html += `<button class="sc-run ${ic}" onclick="runSuite('${id}')">▶ Lancer</button></div>`;
    html += '<div class="sc-body">';
    (s.tests||[]).forEach(t => {
      html += `<div class="stest"><span class="stest-id">${t.id}</span><span class="stest-name">${t.name}</span><span class="stest-dur" id="dur-${t.id}"></span><span class="stest-res" id="r-${t.id}"></span></div>`;
    });
    html += '</div></div>';
  });
  html += '</div>'; c.innerHTML = html;
}

function loadRuns() {
  fetch('/qa/api/test-runs').then(r=>r.json()).then(d => {
    const el = document.getElementById('runs-history');
    const runs = d.runs||[];
    if (!runs.length) { el.innerHTML = '<div class="empty-state">Aucun run local</div>'; return; }
    el.innerHTML = runs.map(r => renderRun(r, 'local')).join('');
  });
}

function renderRun(r, prefix) {
  const total = r.summary?.total||0, passed = r.summary?.passed||0, failed = r.summary?.failed||0;
  const uid = (r.id||'r'+Date.now())+'-'+prefix;
  let h = `<div class="r-entry" onclick="toggleDetail('${uid}',this)"><span class="re-icon">${failed===0?'✅':'❌'}</span>`;
  h += '<div class="re-info"><div class="re-title">'+ (r.suite_name||r.id) +'</div>';
  h += `<div class="re-meta">${(r.timestamp||'').substring(0,16).replace('T',' ')} · ${r.duration||0}s</div></div>`;
  h += '<div class="re-bar">'+(passed>0?`<div class="pass" style="flex:${passed}"></div>`:'')+(failed>0?`<div class="fail" style="flex:${failed}"></div>`:'')+'</div>';
  h += `<span class="re-stats">${passed}/${total}</span><span class="re-arrow">▶</span></div>`;
  h += `<div class="r-detail" id="rd-${uid}">`;
  (r.results||[]).forEach(res => {
    h += `<div class="rd-item"><span class="rd-id">${res.id}</span><span class="rd-name">${res.name}</span><span class="rd-dur">${res.duration}s</span>${res.passed?'✅':'❌'}</div>`;
    if (!res.passed && res.error) h += `<div class="rd-err">${res.error.replace(/</g,'&lt;')}</div>`;
  });
  h += '</div>'; return h;
}

function triggerGitHubRun() {
  const btn = document.getElementById('gh-trigger-btn');
  btn.textContent = '⏳'; btn.disabled = true;
  fetch('/qa/api/github/trigger', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({target_url:window.location.origin,suites:'playwright,api'})})
    .then(r=>r.json()).then(d => { if(d.status==='triggered'){toast('✅ Workflow lancé');setTimeout(loadGitHubRuns,5000)} else toast('❌ '+(d.error||''),true); })
    .catch(e => toast('❌ '+e, true)).finally(() => {btn.textContent='▶ Lancer';btn.disabled=false;});
}

function loadGitHubRuns() {
  fetch('/qa/api/github/qa-runs').then(r=>r.json()).then(data => {
    const el = document.getElementById('gh-runs-list');
    const runs = data.runs||[];
    if (!runs.length) { el.innerHTML = '<div class="empty-state">Aucun run GitHub</div>'; return; }
    el.innerHTML = runs.slice(0,5).map(r => {
      const isDone = r.status==='completed', isFail = r.conclusion==='failure'||r.conclusion==='cancelled', isOk = r.conclusion==='success';
      const icon = isOk?'✅':(isFail?'❌':(r.status==='in_progress'?'⏳':'⏸'));
      const badge = isOk?'success':(isFail?'fail':(r.status==='in_progress'?'progress':'pending'));
      let h = `<div class="r-entry" onclick="fetchGHRunDetail(${r.id},this)"><span class="re-icon">${icon}</span>`;
      h += `<div class="re-info"><div class="re-title">Run #${r.id} <span class="badge ${badge}">${r.status}${isDone?' · '+r.conclusion:''}</span></div>`;
      h += `<div class="re-meta">${(r.created_at||'').substring(0,16).replace('T',' ')} · <a href="${r.html_url}" target="_blank" onclick="event.stopPropagation()">détails ↗</a></div></div>`;
      if (isDone) h += '<span class="re-arrow">▶</span>';
      h += '</div>';
      h += `<div class="r-detail" id="gh-detail-${r.id}"><div class="empty-state" style="padding:12px">Clique pour charger</div></div>`;
      return h;
    }).join('');
    const busy = runs.some(r => r.status==='in_progress'||r.status==='queued');
    if (busy && !ghPollTimer) ghPollTimer = setTimeout(() => { ghPollTimer = null; loadGitHubRuns(); }, 10000);
    else if (!busy && ghPollTimer) { clearTimeout(ghPollTimer); ghPollTimer = null; }
  });
}

function fetchGHRunDetail(runId) {
  const el = document.getElementById('gh-detail-'+runId);
  if (!el) return;
  if (el.dataset.loaded==='true') { el.classList.toggle('open'); return; }
  el.innerHTML = '<div class="empty-state" style="padding:12px">⏳</div>'; el.classList.add('open');
  fetch('/qa/api/github/download-artifact/'+runId).then(r=>r.json()).then(d => {
    if (d.error) { el.innerHTML = `<div class="empty-state" style="padding:12px;color:var(--red)">⚠ ${d.error}</div>`; return; }
    const pt = d.per_test||[], s = d.summary||{};
    let h = `<div style="padding:6px 0 8px;font-size:12px;color:var(--text-dim)"><strong>${s.passed||0} ✅</strong> / <strong>${s.failed||0} ❌</strong> / ${s.total||0}</div>`;
    pt.forEach(t => {
      h += `<div class="rd-item"><span class="rd-id">${t.id}</span><span class="rd-name">${t.name} <span class="rd-suite">${t.suite}</span></span><span class="rd-dur">${t.duration}s</span>${t.passed?'✅':'❌'}</div>`;
      if (!t.passed && t.error) h += `<div class="rd-err">${t.error.replace(/</g,'&lt;')}</div>`;
    });
    if (!pt.length) h += '<div class="empty-state" style="padding:12px">Non disponible</div>';
    el.innerHTML = h; el.dataset.loaded = 'true';
  }).catch(e => { el.innerHTML = `<div class="empty-state" style="padding:12px;color:var(--red)">⚠ ${e}</div>`; });
}

function runSuite(id) {
  fetch(`/qa/api/run-suite/${id}`,{method:'POST'}).then(r=>r.json()).then(d=>{toast(`Suite "${id}" lancée`);pollResults();}).catch(e=>toast('Erreur: '+e,true));
}
function runPlan(id) {
  if (!confirm(`Lancer "${plansData[id]?.name}" ?`)) return;
  fetch(`/qa/api/run-plan/${id}`,{method:'POST'}).then(r=>r.json()).then(d=>toast(`Plan "${id}" lancé`)).catch(e=>toast('Erreur: '+e,true));
  pollResults();
}
function pollResults() {
  let a=0; const iv=setInterval(()=>{a++;fetch('/qa/api/test-runs').then(r=>r.json()).then(d=>{const runs=d.runs||[];if(runs.length&&a>2){const last=runs[0];(last.results||[]).forEach(res=>{const el=document.getElementById('r-'+res.id),dur=document.getElementById('dur-'+res.id);if(el)el.textContent=res.passed?'✅':'❌';if(dur)dur.textContent=(res.duration||0).toFixed(1)+'s';})}loadRuns();if(a>10)clearInterval(iv);});},3000);setTimeout(()=>clearInterval(iv),35000);
}
function toggleDetail(id, btn) {
  const el = document.getElementById('rd-'+id);
  if (el) { el.classList.toggle('open'); const arrow=btn?.querySelector('.re-arrow'); if(arrow) arrow.style.transform=el.classList.contains('open')?'rotate(90deg)':''; }
}
