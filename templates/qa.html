<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA — JobHunt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root { --bg:#f8f9fb; --surface:#fff; --border:#e8ecf0; --border-light:#f0f2f5; --text:#1a1d23; --text2:#4a5060; --text3:#8a92a5; --accent:#0a2540; --blue:#2563eb; --blue-bg:rgba(37,99,235,0.06); --green:#059669; --green-bg:rgba(5,150,105,0.08); --orange:#d97706; --orange-bg:rgba(217,119,6,0.08); --red:#dc2626; --radius:10px; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .top-nav { position:sticky; top:0; z-index:100; height:44px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; background:rgba(255,255,255,0.92); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
  .top-nav a { font-size:12px; font-weight:500; color:var(--text3); text-decoration:none; padding:4px 10px; border-radius:6px; transition:all 0.15s; }
  .top-nav a:hover { color:var(--text); background:var(--border-light); }
  .top-nav a.active { color:var(--accent); background:var(--blue-bg); font-weight:600; }

  .main { max-width: 960px; margin: 24px auto; padding: 0 16px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px 24px; margin-bottom:14px; }

  .section-title { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:1.8px; color:var(--blue); margin-bottom:10px; }
  .section-title .bar { display:flex; gap:4px; align-items:center; }
  .section-title .bar::after { content:''; flex:1; height:1px; background:linear-gradient(90deg, var(--border), transparent); margin-left:8px; }

  .btn-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .btn { padding:6px 14px; border-radius:7px; font-size:11px; font-weight:600; cursor:pointer; border:none; font-family:inherit; display:inline-flex; align-items:center; gap:5px; transition:all 0.15s; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { opacity:0.9; }
  .btn-outline { background:var(--surface); color:var(--text2); border:1px solid var(--border); }
  .btn-outline:hover { border-color:var(--blue); color:var(--blue); }
  .btn-sm { padding:4px 10px; font-size:10px; }

  .status-dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:4px; }
  .status-dot.green { background:var(--green); }
  .status-dot.orange { background:var(--orange); }
  .status-dot.red { background:var(--red); }

  .feature-file { margin-bottom:12px; }
  .feature-file .fname { font-size:12px; font-weight:600; color:var(--accent); margin-bottom:4px; display:flex; align-items:center; gap:6px; }
  .feature-file .fname .count { font-size:10px; font-weight:500; color:var(--text3); }
  .scenario { padding:6px 0 6px 14px; border-left:2px solid var(--border); margin-bottom:4px; }
  .scenario .sname { font-size:11px; font-weight:500; color:var(--text); }
  .scenario .steps { font-size:10px; color:var(--text3); font-family:'JetBrains Mono', monospace; margin-top:2px; }
  .scenario .tags { display:flex; gap:3px; flex-wrap:wrap; margin-top:2px; }
  .scenario .tags span { font-size:8px; padding:1px 5px; border-radius:3px; background:var(--blue-bg); color:var(--blue); }

  .run-item { padding:10px 0; border-bottom:1px solid var(--border-light); display:flex; align-items:center; gap:12px; }
  .run-item:last-child { border-bottom:none; }
  .run-item .run-id { font-size:10px; font-family:'JetBrains Mono', monospace; color:var(--text3); }
  .run-item .run-status { font-size:11px; font-weight:600; }
  .run-item .run-meta { font-size:10px; color:var(--text3); margin-left:auto; }

  .gh-run { padding:8px 0; border-bottom:1px solid var(--border-light); display:flex; align-items:center; gap:10px; font-size:11px; }
  .gh-run:last-child { border-bottom:none; }
  .gh-run .gh-status { font-size:10px; font-weight:600; padding:2px 8px; border-radius:4px; }
  .gh-run .gh-completed { background:var(--green-bg); color:var(--green); }
  .gh-run .gh-failure { background:var(--orange-bg); color:var(--orange); }
  .gh-run .gh-in_progress { background:var(--blue-bg); color:var(--blue); }
  .gh-run a { color:var(--accent); text-decoration:none; }
  .gh-run a:hover { text-decoration:underline; }

  .empty { text-align:center; padding:40px 20px; color:var(--text3); font-size:13px; }
  .empty .icon { font-size:28px; margin-bottom:6px; }

  .toast { position:fixed; bottom:20px; right:20px; background:var(--green); color:#fff; padding:8px 16px; border-radius:8px; font-size:11px; font-weight:600; opacity:0; transform:translateY(20px); transition:all 0.3s; z-index:2000; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.error { background:var(--red); }

  @media(max-width:640px) { .main { padding:0 8px; } .card { padding:14px 16px; } }
</style>
</head>
<body>

<div class="top-nav">
  <div>
    <a href="{{ url_for('index') }}">Dashboard</a>
    <a href="{{ url_for('cv_page') }}">CV</a>
    <a href="#" class="active">QA</a>
    <a href="{{ url_for('stats_page') }}">Stats</a>
  </div>
  <div>
    <a href="{{ url_for('about') }}">À propos</a>
  </div>
</div>

<div class="main">

  <!-- Actions -->
  <div class="card">
    <div class="section-title"><span class="bar">Tests</span></div>
    <div class="btn-row">
      <button class="btn btn-primary btn-sm" onclick="runTests()">▶ Run Tests</button>
      <button class="btn btn-outline btn-sm" onclick="location.reload()">↻ Refresh</button>
    </div>
    <div id="latest-run" style="font-size:11px;color:var(--text3);"></div>
  </div>

  <!-- Test Cases -->
  <div class="card">
    <div class="section-title"><span class="bar">🧪 Cas de test</span></div>
    <div id="test-cases"><div class="empty">Chargement…</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (err ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Load test cases
fetch('/qa/api/test-cases')
  .then(r => r.json())
  .then(data => {
    const el = document.getElementById('test-cases');
    if (!data.categories || data.categories.length === 0) {
      el.innerHTML = '<div class="empty"><div class="icon">📂</div>Aucun fichier .feature trouvé</div>';
      return;
    }
    let html = '';
    data.categories.forEach(cat => {
      html += '<div class="feature-file">';
      html += `<div class="fname">📄 ${cat.file} <span class="count">(${cat.scenarios.length} scénarios)</span></div>`;
      cat.scenarios.forEach(sc => {
        html += '<div class="scenario">';
        html += `<div class="sname">${sc.name}</div>`;
        if (sc.tags && sc.tags.length) {
          html += '<div class="tags">' + sc.tags.map(t => `<span>@${t}</span>`).join('') + '</div>';
        }
        if (sc.steps) {
          html += '<div class="steps">' + sc.steps.join(' │ ') + '</div>';
        }
        html += '</div>';
      });
      html += '</div>';
    });
    el.innerHTML = html;
  })
  .catch(() => document.getElementById('test-cases').innerHTML = '<div class="empty"><div class="icon">❌</div>Erreur de chargement</div>');

// Load latest runs
fetch('/qa/api/runs')
  .then(r => r.json())
  .then(data => {
    const el = document.getElementById('latest-run');
    const runs = data.runs || [];
    if (runs.length === 0) { el.innerHTML = '<span style="color:var(--text3)">Aucun run de tests</span>'; return; }
    const last = runs[0];
    const status = last.status === 'completed' ? (last.failed === 0 ? '✅' : '❌') : '⏳';
    el.innerHTML = `${status} Dernier run: ${last.passed||0} passed, ${last.failed||0} failed, ${last.skipped||0} skipped — ${last.duration}s`;
  })
  .catch(() => {});

function runTests() {
  const btn = event.target; btn.textContent = '⏳ Running...'; btn.disabled = true;
  fetch('/qa/api/runs', {method:'POST'})
    .then(r => r.json())
    .then(d => { toast('Tests lancés (run: ' + d.run_id + ')'); setTimeout(() => location.reload(), 3000); })
    .catch(e => toast('Erreur: ' + e, true))
    .finally(() => { btn.textContent = '▶ Run Tests'; btn.disabled = false; });
}

function triggerGitHub() {
  const btn = event.target; btn.textContent = '⏳...'; btn.disabled = true;
  fetch('/qa/api/github/trigger', {method:'POST'})
    .then(r => r.json())
    .then(d => {
      if (d.error) { toast('Erreur: ' + d.error, true); return; }
      toast('Workflow déclenché ✓');
      setTimeout(() => location.reload(), 2000);
    })
    .catch(e => toast('Erreur: ' + e, true))
    .finally(() => { btn.textContent = '⚡ GitHub Actions'; btn.disabled = false; });
}
</script>
</body>
</html>
