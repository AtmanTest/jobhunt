<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA — JobHunt TestRail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root { --bg:#f5f6fa; --surface:#fff; --border:#e6e9ef; --border-l:#f0f2f5; --text:#1a1d23; --t2:#4a5060; --t3:#8a92a5; --accent:#0a2540; --blue:#2563eb; --blue-bg:rgba(37,99,235,0.06); --green:#059669; --green-bg:rgba(5,150,105,0.08); --orange:#d97706; --orange-bg:rgba(217,119,6,0.08); --red:#dc2626; --red-bg:rgba(220,38,38,0.06); --r:10px; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
  ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .top-nav { position:sticky; top:0; z-index:100; height:44px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; background:rgba(255,255,255,0.92); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
  .top-nav a { font-size:12px; font-weight:500; color:var(--t3); text-decoration:none; padding:4px 10px; border-radius:6px; }
  .top-nav a:hover { color:var(--text); background:var(--border-l); }
  .top-nav a.active { color:var(--accent); background:var(--blue-bg); font-weight:600; }

  .main { max-width:1060px; margin:20px auto; padding:0 16px; }

  /* Plans bar */
  .plans-bar { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .plan-btn { padding:7px 16px; border-radius:8px; border:1px solid var(--border); background:var(--surface); font-size:11px; font-weight:600; cursor:pointer; color:var(--t2); font-family:inherit; transition:all 0.15s; display:flex; align-items:center; gap:5px; }
  .plan-btn:hover { border-color:var(--blue); color:var(--blue); }
  .plan-btn.active { border-color:var(--blue); background:var(--blue-bg); color:var(--blue); }
  .plan-btn .count { font-size:9px; color:var(--t3); font-weight:500; }

  /* Suite cards */
  .suite-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:10px; margin-bottom:16px; }
  .suite-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px 18px; transition:all 0.15s; }
  .suite-card:hover { border-color:var(--blue); }
  .suite-card .sc-icon { font-size:18px; margin-bottom:4px; }
  .suite-card .sc-name { font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; }
  .suite-card .sc-desc { font-size:10px; color:var(--t3); margin:2px 0 8px; }
  .suite-card .sc-count { font-size:10px; color:var(--t2); font-weight:500; }
  .suite-card .sc-btn { padding:4px 12px; border-radius:6px; border:none; background:var(--accent); color:#fff; font-size:10px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:8px; }
  .suite-card .sc-btn:hover { opacity:0.9; }

  /* Test list */
  .test-list { margin-top:8px; }
  .test-item { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid var(--border-l); font-size:11px; }
  .test-item:last-child { border-bottom:none; }
  .test-item .tid { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--t3); width:50px; flex-shrink:0; }
  .test-item .tname { flex:1; color:var(--text); }
  .test-item .tdesc { font-size:9px; color:var(--t3); }
  .test-item .tresult { font-size:12px; width:20px; text-align:center; }

  /* Runs history */
  .runs-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px 18px; margin-bottom:16px; }
  .runs-section .rs-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--accent); margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
  .run-entry { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid var(--border-l); font-size:11px; cursor:pointer; }
  .run-entry:last-child { border-bottom:none; }
  .run-entry .re-icon { font-size:16px; }
  .run-entry .re-info { flex:1; }
  .run-entry .re-name { font-weight:600; }
  .run-entry .re-meta { font-size:9px; color:var(--t3); }
  .run-entry .re-bar { display:flex; gap:2px; height:6px; border-radius:3px; overflow:hidden; width:80px; background:var(--border-l); }
  .run-entry .re-bar .pass { background:var(--green); }
  .run-entry .re-bar .fail { background:var(--red); }
  .run-entry .re-stats { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--t2); }

  /* Expandable per-test details */
  .run-detail { display:none; padding:6px 0 8px 32px; }
  .run-detail.open { display:block; }
  .rd-test { display:flex; align-items:center; gap:8px; padding:3px 0; font-size:11px; }
  .rd-test .rd-id { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--t3); width:50px; }
  .rd-test .rd-name { flex:1; }
  .rd-test .rd-dur { font-size:9px; color:var(--t3); width:50px; text-align:right; }
  .rd-test .rd-err { font-size:10px; color:var(--red); margin-left:58px; padding:2px 8px; background:var(--red-bg); border-radius:4px; }

  /* GitHub CI section */
  .gh-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .gh-btn { padding:6px 16px; border-radius:6px; border:none; background:#1b1f23; color:#fff; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:6px; }
  .gh-btn:hover { opacity:0.9; }
  .gh-btn:disabled { opacity:0.5; cursor:not-allowed; }
  .gh-badge { font-size:10px; padding:2px 8px; border-radius:4px; font-weight:600; }
  .gh-badge.completed { background:var(--green-bg); color:var(--green); }
  .gh-badge.failure { background:var(--red-bg); color:var(--red); }
  .gh-badge.in_progress { background:var(--orange-bg); color:var(--orange); }
  .gh-badge.pending { background:var(--blue-bg); color:var(--blue); }

  .empty-state { text-align:center; padding:30px; color:var(--t3); font-size:12px; }
  .toast { position:fixed; bottom:20px; right:20px; padding:8px 16px; border-radius:8px; font-size:11px; font-weight:600; opacity:0; transform:translateY(20px); transition:all 0.3s; z-index:2000; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.ok { background:var(--green); color:#fff; }
  .toast.err { background:var(--red); color:#fff; }
  .loading-dots::after { content:''; animation:dots 1.5s infinite; }
  @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }

  @media(max-width:640px) { .suite-grid { grid-template-columns:1fr; } .main { padding:0 8px; } }
</style>
</head>
<body>

<div class="top-nav">
  <div>
    <a href="{{ url_for('index') }}">Dashboard</a>
    <a href="{{ url_for('cv_page') }}">CV</a>
    <a href="#" class="active">QA</a>
    <a href="{{ url_for('stats_page') }}">Stats</a>
  </div>
  <div><a href="{{ url_for('about') }}">À propos</a></div>
</div>

<div class="main">

  <!-- Plans -->
  <div class="plans-bar" id="plans-bar">
    <button class="plan-btn active" onclick="showPlan('all')">📋 Tous les tests</button>
  </div>

  <!-- Suites grid -->
  <div id="suites-container"><div class="empty-state">Chargement…</div></div>

  <!-- GitHub CI section (en haut — démo recruteur) -->
  <div class="runs-section" style="margin-bottom:16px;">
    <div class="rs-title">
      <span>🐙 CI GitHub (Playwright sur GitHub Actions)</span>
      <button class="gh-btn" id="gh-trigger-btn" onclick="triggerGitHubRun()">▶ Lancer sur GitHub</button>
    </div>
    <div class="gh-header">
      <span style="font-size:10px;color:var(--t3);">Les tests Playwright + API s'exécutent sur GitHub (Chrome natif) et les résultats remontent ici test par test</span>
    </div>
    <div id="gh-runs-list"><div class="empty-state">Aucun run GitHub — lance un test !</div></div>
  </div>

  <!-- Local runs history -->
  <div class="runs-section">
    <div class="rs-title">📊 Historique des runs (local)</div>
    <div id="runs-history"><div class="empty-state">Chargement…</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let suitesData = {};
let plansData = {};

function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (err ? 'err' : 'ok');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Load suite definitions
fetch('/qa/api/suites')
  .then(r => r.json())
  .then(data => {
    suitesData = data.suites || {};
    plansData = data.plans || {};

    // Build plan buttons
    const bar = document.getElementById('plans-bar');
    Object.entries(plansData).forEach(([id, p]) => {
      const btn = document.createElement('button');
      btn.className = 'plan-btn';
      btn.innerHTML = `${p.icon || '📋'} ${p.name} <span class="count">(${p.suites.length} suites)</span>`;
      btn.onclick = () => runPlan(id);
      bar.appendChild(btn);
    });

    renderSuites();
    loadRuns();
    loadGitHubRuns();
  })
  .catch(() => document.getElementById('suites-container').innerHTML = '<div class="empty-state">❌ Erreur</div>');

function renderSuites() {
  const container = document.getElementById('suites-container');
  let html = '<div class="suite-grid">';

  Object.entries(suitesData).forEach(([id, s]) => {
    html += '<div class="suite-card">';
    html += `<div class="sc-icon">${s.icon || '📦'}</div>`;
    html += `<div class="sc-name">${s.name} <span class="sc-count">(${s.test_count} tests)</span></div>`;
    html += `<div class="sc-desc">${s.description}</div>`;
    html += `<button class="sc-btn" onclick="runSuite('${id}')">▶ Lancer (local)</button>`;
    // Test list
    html += '<div class="test-list">';
    (s.tests || []).forEach(t => {
      html += `<div class="test-item">`;
      html += `<span class="tid">${t.id}</span>`;
      html += `<span class="tname">${t.name}</span>`;
      html += `<span class="tdesc">${t.description || ''}</span>`;
      html += `<span class="tresult" id="r-${t.id}"></span>`;
      html += `</div>`;
    });
    html += '</div></div>';
  });

  html += '</div>';
  container.innerHTML = html;
}

function loadRuns() {
  fetch('/qa/api/test-runs')
    .then(r => r.json())
    .then(data => {
      const el = document.getElementById('runs-history');
      const runs = data.runs || [];
      if (runs.length === 0) {
        el.innerHTML = '<div class="empty-state">Aucun run local — lance un test !</div>';
        return;
      }
      let html = '';
      runs.forEach(r => {
        const total = r.summary?.total || 0;
        const passed = r.summary?.passed || 0;
        const failed = r.summary?.failed || 0;
        const pct = total > 0 ? (passed / total * 100) : 0;
        const icon = failed === 0 ? '✅' : '❌';
        const name = r.plan ? (plansData[r.plan]?.icon + ' ' + plansData[r.plan]?.name) : (suitesData[r.suite]?.icon + ' ' + suitesData[r.suite]?.name) || r.suite_name || r.id;
        html += '<div class="run-entry" onclick="toggleDetail(\''+r.id+'-local\')">';
        html += `<span class="re-icon">${icon}</span>`;
        html += '<div class="re-info">';
        html += `<div class="re-name">${name}</div>`;
        html += `<div class="re-meta">${(r.timestamp || '').substring(0,16).replace('T',' ')} · ${r.duration}s</div>`;
        html += '</div>';
        html += '<div class="re-bar">';
        if (passed > 0) html += `<div class="pass" style="flex:${passed}"></div>`;
        if (failed > 0) html += `<div class="fail" style="flex:${failed}"></div>`;
        html += '</div>';
        html += `<span class="re-stats">${passed}/${total}</span>`;
        html += '</div>';

        // Per-test detail (expandable)
        html += `<div class="run-detail" id="rd-${r.id}-local">`;
        (r.results || []).forEach(res => {
          const ric = res.passed ? '✅' : '❌';
          html += `<div class="rd-test"><span class="rd-id">${res.id}</span><span class="rd-name">${res.name}</span><span class="rd-dur">${res.duration}s</span>${ric}</div>`;
          if (!res.passed && res.error) {
            html += `<div class="rd-err">${res.error}</div>`;
          }
        });
        html += '</div>';
      });
      el.innerHTML = html;
    });
}

// ─── GitHub CI ─────────────────────────────────────────────────

function triggerGitHubRun() {
  const btn = document.getElementById('gh-trigger-btn');
  btn.textContent = '⏳ Déclenchement...';
  btn.disabled = true;

  fetch('/qa/api/github/trigger', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      target_url: window.location.origin,
      suites: 'playwright,api'
    })
  })
  .then(r => r.json())
  .then(d => {
    if (d.status === 'triggered') {
      toast('✅ Workflow lancé sur GitHub ! Résultats dans ~2-3 min');
      // Poll for the new run
      setTimeout(loadGitHubRuns, 5000);
    } else {
      toast('❌ ' + (d.error || 'Erreur inconnue'), true);
    }
  })
  .catch(e => toast('❌ Erreur réseau: ' + e, true))
  .finally(() => { btn.textContent = '▶ Lancer sur GitHub'; btn.disabled = false; });
}

function loadGitHubRuns() {
  fetch('/qa/api/github/qa-runs')
    .then(r => r.json())
    .then(data => {
      const el = document.getElementById('gh-runs-list');
      const runs = data.runs || [];
      if (runs.length === 0) {
        el.innerHTML = '<div class="empty-state">Aucun run GitHub — lance un test !</div>';
        return;
      }

      let html = '';
      runs.slice(0, 5).forEach(r => {
        const status = r.status;
        const conclusion = r.conclusion || 'pending';
        const isComplete = status === 'completed';
        const isFailed = conclusion === 'failure' || conclusion === 'cancelled';
        const isSuccess = conclusion === 'success';
        const icon = isSuccess ? '✅' : (isFailed ? '❌' : (status === 'in_progress' ? '⏳' : '⏸'));
        const badgeClass = isSuccess ? 'completed' : (isFailed ? 'failure' : (status === 'in_progress' ? 'in_progress' : 'pending'));

        html += `<div class="run-entry" onclick="fetchGHRunDetail(${r.id}, this)">`;
        html += `<span class="re-icon">${icon}</span>`;
        html += '<div class="re-info">';
        html += `<div class="re-name">Run #${r.id} <span class="gh-badge ${badgeClass}">${status}${isComplete ? ' · ' + conclusion : ''}</span></div>`;
        html += `<div class="re-meta">${(r.created_at || '').substring(0,16).replace('T',' ')} · <a href="${r.html_url}" target="_blank" style="color:var(--blue)">voir sur GitHub</a></div>`;
        html += '</div>';
        if (isComplete) {
          html += `<span style="font-size:10px;color:var(--t3)">cliquer pour détails →</span>`;
        }
        html += '</div>';

        // Detail container (populated on click)
        html += `<div class="run-detail" id="gh-detail-${r.id}"><div class="empty-state" style="padding:10px">⬆️ Clique sur le run pour charger les résultats</div></div>`;
      });
      el.innerHTML = html;

      // Auto-poll for in_progress runs
      const inProgress = runs.some(r => r.status === 'in_progress' || r.status === 'queued' || r.status === 'pending');
      if (inProgress) {
        setTimeout(loadGitHubRuns, 10000); // poll again in 10s
      }
    })
    .catch(e => {
      document.getElementById('gh-runs-list').innerHTML = '<div class="empty-state">⚠️ Erreur chargement GitHub</div>';
    });
}

function fetchGHRunDetail(runId, entryEl) {
  const detailEl = document.getElementById('gh-detail-' + runId);
  if (!detailEl) return;

  // If already loaded, just toggle
  if (detailEl.dataset.loaded === 'true') {
    detailEl.classList.toggle('open');
    return;
  }

  detailEl.innerHTML = '<div class="empty-state" style="padding:10px">⏳ Chargement des résultats détaillés...</div>';
  detailEl.classList.add('open');

  fetch('/qa/api/github/download-artifact/' + runId)
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        detailEl.innerHTML = `<div class="empty-state" style="padding:10px;color:var(--red)">⚠️ ${data.error}</div>`;
        return;
      }

      const perTest = data.per_test || [];
      const summary = data.summary || {};

      let html = `<div style="padding:6px 0 4px;font-size:10px;color:var(--t3);border-bottom:1px solid var(--border-l);margin-bottom:4px;">`;
      html += `<strong>Résumé :</strong> ${summary.passed || 0} ✅ / ${summary.failed || 0} ❌ / ${summary.total || 0} total</div>`;

      perTest.forEach(t => {
        const ric = t.passed ? '✅' : '❌';
        html += `<div class="rd-test"><span class="rd-id">${t.id}</span>`;
        html += `<span class="rd-name">${t.name} <span style="font-size:9px;color:var(--t3)">(${t.suite})</span></span>`;
        html += `<span class="rd-dur">${t.duration}s</span>${ric}</div>`;
        if (!t.passed && t.error) {
          html += `<div class="rd-err">${t.error}</div>`;
        }
      });

      if (perTest.length === 0) {
        html += '<div class="empty-state" style="padding:10px">Aucun résultat test par test disponible. Les artefacts ne sont peut-être pas encore accessibles.</div>';
      }

      detailEl.innerHTML = html;
      detailEl.dataset.loaded = 'true';
    })
    .catch(err => {
      detailEl.innerHTML = `<div class="empty-state" style="padding:10px;color:var(--red)">⚠️ Erreur: ${err}</div>`;
    });
}

// ─── Suite / Plan local runs ────────────────────────────────────

function runSuite(suiteId) {
  fetch(`/qa/api/run-suite/${suiteId}`, {method:'POST'})
    .then(r => r.json())
    .then(d => {
      toast(`Suite "${suiteId}" lancée`);
      pollResults();
    })
    .catch(e => toast('Erreur: '+e, true));
}

function runPlan(planId) {
  if (!confirm(`Lancer le plan "${plansData[planId]?.name}" sur Render ? (sans Playwright — API seulement)`)) return;
  fetch(`/qa/api/run-plan/${planId}`, {method:'POST'})
    .then(r => r.json())
    .then(d => toast(`Plan "${planId}" lancé`))
    .catch(e => toast('Erreur: '+e, true));
  pollResults();
}

function pollResults() {
  let attempts = 0;
  const iv = setInterval(() => {
    attempts++;
    fetch('/qa/api/test-runs')
      .then(r => r.json())
      .then(data => {
        const runs = data.runs || [];
        if (runs.length > 0 && attempts > 2) {
          const last = runs[0];
          (last.results || []).forEach(r => {
            const el = document.getElementById('r-' + r.id);
            if (el) el.textContent = r.passed ? '✅' : '❌';
          });
        }
        loadRuns();
        if (attempts > 10) { clearInterval(iv); }
      });
  }, 3000);
  setTimeout(() => clearInterval(iv), 35000);
}

function toggleDetail(id) {
  const el = document.getElementById('rd-' + id);
  if (el) el.classList.toggle('open');
}

function showPlan(id) {
  // Simple filter toggle
}
</script>
</body>
</html>
