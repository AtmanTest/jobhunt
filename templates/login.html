<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobHunt · Connexion</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f14;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .auth-box {
    background: #1a1a24;
    border: 1px solid #2a2a3a;
    border-radius: 12px;
    padding: 40px;
    width: 380px;
    max-width: 90vw;
  }
  .auth-box h1 { font-size: 24px; margin-bottom: 4px; }
  .auth-box p { color: #888; margin-bottom: 24px; font-size: 14px; }
  .auth-box input {
    width: 100%;
    padding: 10px 14px;
    background: #0f0f14;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
  }
  .auth-box input:focus { border-color: #4f46e5; }
  .auth-box button {
    width: 100%;
    padding: 10px;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .auth-box button:hover { background: #6366f1; }
  .auth-box .error { color: #ef4444; font-size: 13px; margin-bottom: 12px; display: none; }
  .auth-box .toggle { color: #888; font-size: 13px; text-align: center; margin-top: 16px; }
  .auth-box .toggle a { color: #4f46e5; cursor: pointer; text-decoration: none; }
  .auth-box .toggle a:hover { text-decoration: underline; }
  .logo { text-align: center; margin-bottom: 20px; font-size: 32px; }
  .loader { display: none; width: 20px; height: 20px; border: 2px solid #444; border-top: 2px solid #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="auth-box">
  <div class="logo">🔍</div>
  <h1>JobHunt</h1>
  <p id="subtitle">Connecte-toi pour accéder à tes offres</p>

  <div class="error" id="error-msg"></div>

  <form id="auth-form">
    <input type="email" id="email" placeholder="Email" required autocomplete="email">
    <input type="password" id="password" placeholder="Mot de passe" required autocomplete="current-password" minlength="6">
    <button type="submit" id="auth-btn">Se connecter</button>
  </form>

  <div class="loader" id="loader"></div>

  <div class="toggle">
    <span id="toggle-text">Pas encore de compte ? </span>
    <a id="toggle-link">Créer un compte</a>
  </div>
</div>

<script>
let isSignup = false;
const form = document.getElementById('auth-form');
const email = document.getElementById('email');
const password = document.getElementById('password');
const btn = document.getElementById('auth-btn');
const subtitle = document.getElementById('subtitle');
const toggleText = document.getElementById('toggle-text');
const toggleLink = document.getElementById('toggle-link');
const errorMsg = document.getElementById('error-msg');
const loader = document.getElementById('loader');

toggleLink.onclick = () => {
  isSignup = !isSignup;
  btn.textContent = isSignup ? 'Créer un compte' : 'Se connecter';
  subtitle.textContent = isSignup ? 'Crée ton compte pour commencer' : 'Connecte-toi pour accéder à tes offres';
  toggleText.textContent = isSignup ? 'Déjà un compte ? ' : 'Pas encore de compte ? ';
  toggleLink.textContent = isSignup ? 'Se connecter' : 'Créer un compte';
  errorMsg.style.display = 'none';
};

form.onsubmit = async (e) => {
  e.preventDefault();
  errorMsg.style.display = 'none';
  btn.style.display = 'none';
  loader.style.display = 'block';

  try {
    const res = await fetch(isSignup ? '/api/auth/signup' : '/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email: email.value, password: password.value }),
    });
    const data = await res.json();
    if (data.error) {
      errorMsg.textContent = data.error;
      errorMsg.style.display = 'block';
    } else {
      window.location.href = '/';
    }
  } catch (err) {
    errorMsg.textContent = 'Erreur réseau';
    errorMsg.style.display = 'block';
  } finally {
    btn.style.display = 'block';
    loader.style.display = 'none';
  }
};
</script>
</body>
</html>
