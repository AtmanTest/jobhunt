services:
  - type: web
    name: jobhunt
    runtime: python
    repo: https://github.com/AtmanTest/jobhunt
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEEPSEEK_API_KEY
        sync: false
