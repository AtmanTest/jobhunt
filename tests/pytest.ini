[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
markers =
    scraping: Tests for job scrapers
    remoteok: RemoteOK scraper tests
    wwr: We Work Remotely scraper tests
    linkedin: LinkedIn scraper tests
    wellfound: Wellfound scraper tests
    otta: Otta scraper tests
    filtering: Job filtering tests
    dedup: Deduplication tests
    enrichment: AI enrichment tests
    ai: AI-related tests
    api: API endpoint tests
    backend: Backend tests
    stats: Stats endpoint tests
    saved: Saved jobs endpoint tests
    frontend: Frontend tests
    e2e: End-to-end tests
    filters: Filter tests
    cards: Job card tests
    kanban: Kanban pipeline tests
    cron: Cron job tests
    automation: Automation tests
    regression: Regression tests
    bug-fix: Bug fix verification tests
    bugs: BDD marker for regression features
    bug-D1: Bug D1 - doublons dans JOBS DU JOUR
    bug-D2: Bug D2 - doublons TOP MATCHES
    bug-D3: Bug D3 - doublon title+company
    bug-S1: Bug S1 - stats page 404
    bug-L1: Bug L1 - LinkedIn scraper navigation
    bug-L2: Bug L2 - LinkedIn scraper dedup
    bug-L3: Bug L3 - LinkedIn keywords FR
    bug-V1: Bug V1 - Vision NVIDIA 401
    navigation: Navigation tests
    functional: Functional tests
    critical: Critical severity
    high: High severity
    medium: Medium severity
    low: Low severity
    slow: Slow tests that should be skipped by default
    integration: Integration tests requiring external services

addopts =
    --strict-markers
    -v
    --tb=short
    --no-header

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
